{{hero}}
<section class="section section--tight" data-gallery-page>
  <div class="container stack-lg">
    <div class="panel panel--soft">
      <div class="section-heading section-heading--split section-heading--compact" id="gallery-controls">
        <div>
          <p class="eyebrow">Filter and sort</p>
          <h2>Search across title, tags, region, location, and mountain</h2>
        </div>
      </div>
      {{filters}}
    </div>
    <p class="results-summary" data-gallery-summary>Showing all photos.</p>
    {{galleryGrid}}
    <p class="empty-state" data-gallery-empty hidden>No photos matched those filters yet. Try clearing a few controls or jump into a collection.</p>
    <button class="button button--secondary load-more" type="button" data-gallery-load-more>Load more photos</button>
  </div>
</section>
